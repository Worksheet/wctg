# fly.toml app configuration file generated for wctg on 2026-05-20T01:27:14+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wctg'
primary_region = 'lhr'

[build]

[env]
  DB_PATH = '/data/wctg.db'
  PORT = '3000'

[[mounts]]
  source = 'wctg_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
